# BullDB Multi-Language Package Publication Pipeline
# --------------------------------------------------
#
# This GitHub Actions workflow automates the publication of BullDB to multiple
# language package managers. It is designed to be triggered on release creation
# or triggered manually via workflow_dispatch.
#
# Prerequisite GitHub Secrets:
# 1. NPM_TOKEN: Authentication token for npmjs.org.
# 2. PYPI_API_TOKEN: API token for pypi.org (requires prefix "pypi-").
# 3. NUGET_API_KEY: API key for nuget.org.
# 4. CARGO_REGISTRY_TOKEN: API token for crates.io.
# 5. PERSONAL_ACCESS_TOKEN: A GitHub PAT with write access to push tags if the default GITHUB_TOKEN has insufficient rights.
#
# To Sync package versions, modify "version.json" at the repository root and run "python sync_versions.py".

name: Publish Packages

permissions:
  contents: write
  id-token: write
  packages: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # 1. Publish TypeScript/Node package to NPM
  publish-npm:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Sync Versions with Build Number
        run: python sync_versions.py --build-number ${{ github.run_number }}

      - name: Copy LICENSE
        run: |
          cp LICENSE.md typescript/

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install Dependencies
        run: |
          cd typescript
          npm ci

      - name: Build JS & TS Typings
        run: |
          cd typescript
          npm run build

      - name: Publish Package to NPM
        if: ${{ env.NPM_TOKEN != '' }}
        run: |
          cd typescript
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "Attempting to unpublish $PKG_NAME@$PKG_VER if it exists to allow replacement..."
          npm unpublish "$PKG_NAME@$PKG_VER" --force || true
          
          echo "Publishing package..."
          npm publish --access public || echo "Package version already published on NPM, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Package to GitHub Packages
        run: |
          cd typescript
          echo "@vikukumar:registry=https://npm.pkg.github.com" > .npmrc
          echo "//npm.pkg.github.com/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc
          
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "Attempting to unpublish $PKG_NAME@$PKG_VER from GitHub Packages..."
          npm unpublish "$PKG_NAME@$PKG_VER" --force || true
          
          echo "Publishing package..."
          npm publish || echo "Package already published to GitHub Packages, skipping."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack NPM Package
        run: |
          cd typescript
          npm pack
          mkdir -p ../npm-out
          mv *.tgz ../npm-out/

      - name: Upload NPM Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-artifact
          path: npm-out/

  # 2. Publish Python package to PyPI
  publish-pypi:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for PyPI OIDC Trusted Publishing
      contents: read
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Sync Versions with Build Number
        run: python sync_versions.py --build-number ${{ github.run_number }}

      - name: Copy LICENSE
        run: |
          cp LICENSE.md python/

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Build Tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build Source and Wheel Distributions
        run: |
          cd python
          python -m build

      - name: Publish Package to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' || github.repository == 'vikukumar/bulldb' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          packages-dir: python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

      - name: Upload PyPI Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-artifact
          path: python/dist/

  # 3. Publish C# package to NuGet
  publish-nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for NuGet OIDC Trusted Publishing
      contents: read
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Sync Versions with Build Number
        run: python sync_versions.py --build-number ${{ github.run_number }}

      - name: Copy LICENSE
        run: |
          cp LICENSE.md csharp/BullDB/

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore csharp/BullDB/BullDB.csproj

      - name: Build and Pack Release
        run: |
          dotnet pack csharp/BullDB/BullDB.csproj -c Release -o out

      - name: NuGet Login (OIDC)
        if: ${{ env.NUGET_API_KEY == '' && github.repository == 'vikukumar/bulldb' }}
        uses: nuget/login@v1
        id: login
        with:
          user: ${{ github.repository_owner }}

      - name: Publish Package to NuGet
        if: ${{ env.NUGET_API_KEY != '' || github.repository == 'vikukumar/bulldb' }}
        run: |
          API_KEY="${{ secrets.NUGET_API_KEY }}"
          if [ -z "$API_KEY" ]; then
            API_KEY="${{ steps.login.outputs.NUGET_API_KEY }}"
          fi
          
          if [ -n "$API_KEY" ]; then
            echo "Pushing NuGet package..."
            dotnet nuget push out/*.nupkg --api-key "$API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate || echo "NuGet package push failed (might already exist)."
          else
            echo "No API key found. Skipping NuGet publish."
          fi

      - name: Publish Package to GitHub Packages (NuGet)
        run: |
          dotnet nuget add source --username "${{ github.repository_owner }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" || true
          dotnet nuget push out/*.nupkg --api-key "${{ secrets.GITHUB_TOKEN }}" --source github --skip-duplicate || echo "GitHub NuGet push failed (might already exist)."

      - name: Upload NuGet Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-artifact
          path: out/

  # 4. Publish Rust package to Crates.io
  publish-crates-io:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Sync Versions with Build Number
        run: python sync_versions.py --build-number ${{ github.run_number }}

      - name: Copy LICENSE
        run: |
          cp LICENSE.md rust/bulldb/

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Package Verification
        run: |
          cd rust/bulldb
          cargo package --allow-dirty

      - name: Publish Package to Crates.io
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        run: |
          cd rust/bulldb
          set +e
          OUTPUT=$(cargo publish --token "${{ secrets.CARGO_REGISTRY_TOKEN }}" --allow-dirty 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q -i "already uploaded"; then
              echo "Crate version is already uploaded on crates.io. Skipping."
              exit 0
            else
              echo "::error::Failed to publish to crates.io."
              echo "::error::Please ensure that:"
              echo "::error::1. Your crates.io account has a verified email address (https://crates.io/settings/profile)."
              echo "::error::2. Your API token is valid and has both 'publish-new' and 'publish-update' scopes."
              exit $EXIT_CODE
            fi
          fi

      - name: Pack Cargo Package
        run: |
          cd rust/bulldb
          cargo package --allow-dirty
          mkdir -p ../../cargo-out
          cp target/package/*.crate ../../cargo-out/

      - name: Upload Cargo Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cargo-artifact
          path: cargo-out/

  # 5. Create Git Release and Upload Package Files
  create-release:
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-pypi, publish-nuget, publish-crates-io]
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Sync Versions with Build Number
        run: python sync_versions.py --build-number ${{ github.run_number }}

      - name: Create Release Directory
        run: mkdir release-assets

      - name: Download all Package Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-artifact"
          path: release-assets
          merge-multiple: true
        continue-on-error: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="v${{ env.VERSION }}"
          
          # Delete existing release/tag locally and on remote if it already exists (to support re-runs / overwrites)
          gh release delete "$TAG_NAME" -y || true
          git tag -d "$TAG_NAME" || true
          git push origin :refs/tags/"$TAG_NAME" || true
          
          # Create new release and upload all assets
          gh release create "$TAG_NAME" \
            release-assets/* \
            --title "Release $TAG_NAME" \
            --notes "BullDB multi-language SDK release package files for version ${{ env.VERSION }}. Includes package builds for NPM, PyPI, NuGet, and Crates.io."

      - name: Trigger Go Proxy Fetch
        run: |
          VERSION_TAG="v${{ env.VERSION }}"
          echo "Requesting Go proxy to cache $VERSION_TAG..."
          curl -s "https://proxy.golang.org/github.com/vikukumar/bulldb/@v/$VERSION_TAG.info"
